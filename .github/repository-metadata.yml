  - diffusers
  - ffmpeg
  - python
social_preview:
  title: L2MAS
  subtitle: Live2D Multi-Agent Animation System
  tagline: MCP + A2A + provider routing for cloud and local AI animation pipelines
  asset: docs/assets/social-preview.svg
canonical_language: en
