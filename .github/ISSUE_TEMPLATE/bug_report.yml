name: Bug report
description: Report a reproducible problem in the prototype.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve L2MAS. Please remove secrets from logs before posting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, config changes, provider entries, and sample input.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, local/cloud providers, GPU, and relevant runtime versions.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs with secrets removed.
      render: shell
